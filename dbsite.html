<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ConnecTech by YMCA Vietnam — SQL Course</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Sora:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/sql-wasm.js"></script>
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2235;
    --border: #1f2d44;
    --accent: #00d4ff;
    --accent2: #ff6b35;
    --accent3: #7c3aed;
    --green: #10b981;
    --red: #ef4444;
    --yellow: #f59e0b;
    --text: #e2e8f0;
    --muted: #64748b;
    --mono: 'Space Mono', monospace;
    --sans: 'Sora', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HERO */
  .hero {
    background: linear-gradient(135deg, #0a0e1a 0%, #0d1b2a 50%, #0a1628 100%);
    padding: 60px 40px 80px;
    text-align: center;
    position: relative;
    overflow: hidden;
    border-bottom: 1px solid var(--border);
  }
  .hero::before {
    content: '';
    position: absolute;
    top: -100px; left: 50%;
    transform: translateX(-50%);
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(0,212,255,0.08) 0%, transparent 70%);
    pointer-events: none;
  }
  .hero-badge {
    display: inline-block;
    background: rgba(0,212,255,0.1);
    border: 1px solid rgba(0,212,255,0.3);
    color: var(--accent);
    font-family: var(--mono);
    font-size: 11px;
    padding: 6px 14px;
    border-radius: 20px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 24px;
  }
  .hero h1 {
    font-size: clamp(36px, 6vw, 72px);
    font-weight: 800;
    line-height: 1.1;
    margin-bottom: 20px;
    background: linear-gradient(135deg, #ffffff 0%, var(--accent) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .hero p {
    font-size: 18px;
    color: var(--muted);
    max-width: 560px;
    margin: 0 auto 40px;
    line-height: 1.7;
    font-weight: 300;
  }
  .progress-bar-wrap {
    max-width: 500px;
    margin: 0 auto;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .progress-bar-bg {
    flex: 1;
    height: 8px;
    background: var(--border);
    border-radius: 4px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent3));
    border-radius: 4px;
    transition: width 0.6s ease;
  }
  .progress-label {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--accent);
    white-space: nowrap;
  }

  /* LAYOUT */
  .app-layout {
    display: flex;
    min-height: calc(100vh - 200px);
  }

  /* SIDEBAR */
  .sidebar {
    width: 280px;
    min-width: 280px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 28px 0;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
  }
  .sidebar-title {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    padding: 16px 24px 18px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .sidebar-title svg {
    flex-shrink: 0;
  }
  .chapter-group { margin-bottom: 4px; }
  .chapter-btn {
    width: 100%;
    background: none;
    border: none;
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 600;
    padding: 10px 24px;
    text-align: left;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 10px;
    letter-spacing: 0.3px;
    transition: all 0.2s;
    opacity: 0.7;
  }
  .chapter-btn:hover { opacity: 1; background: var(--surface2); }
  .chapter-btn.active { color: var(--accent); opacity: 1; background: rgba(0,212,255,0.05); border-left: 3px solid var(--accent); }
  .chapter-num {
    width: 22px; height: 22px;
    background: var(--border);
    border-radius: 50%;
    font-family: var(--mono);
    font-size: 10px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
  }
  .chapter-btn.active .chapter-num, .chapter-btn.completed .chapter-num {
    background: var(--accent);
    color: var(--bg);
  }
  .chapter-btn.completed { opacity: 0.6; }
  .chapter-btn.completed .chapter-num::after { content: '✓'; }

  /* MAIN CONTENT */
  .main-content {
    flex: 1;
    padding: 48px 56px;
    max-width: 900px;
    overflow-y: auto;
  }

  .chapter-header {
    margin-bottom: 40px;
  }
  .chapter-tag {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--accent2);
    margin-bottom: 12px;
  }
  .chapter-header h2 {
    font-size: 42px;
    font-weight: 800;
    line-height: 1.15;
    margin-bottom: 16px;
  }
  .chapter-header .lead {
    font-size: 17px;
    color: var(--muted);
    line-height: 1.8;
    max-width: 680px;
    font-weight: 300;
  }

  /* CONTENT BLOCKS */
  .concept-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px 32px;
    margin-bottom: 28px;
    position: relative;
    overflow: hidden;
  }
  .concept-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 4px; height: 100%;
    background: linear-gradient(180deg, var(--accent), var(--accent3));
  }
  .concept-card h3 {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 14px;
    color: var(--accent);
    padding-left: 0;
  }
  .concept-card p, .concept-card li {
    font-size: 15px;
    line-height: 1.8;
    color: #94a3b8;
    margin-bottom: 10px;
  }
  .concept-card ul { padding-left: 20px; }
  .concept-card strong { color: var(--text); }

  .analogy-box {
    background: linear-gradient(135deg, rgba(124,58,237,0.08), rgba(0,212,255,0.05));
    border: 1px solid rgba(124,58,237,0.25);
    border-radius: 12px;
    padding: 20px 24px;
    margin-bottom: 28px;
    display: flex;
    gap: 16px;
    align-items: flex-start;
  }
  .analogy-icon { font-size: 28px; flex-shrink: 0; }
  .analogy-text { font-size: 15px; line-height: 1.75; color: #94a3b8; }
  .analogy-text strong { color: #c4b5fd; }

  /* CODE BLOCKS */
  .code-block {
    background: #060d1a;
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 28px;
    overflow: hidden;
  }
  .code-header {
    background: var(--surface2);
    padding: 10px 18px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--border);
  }
  .code-header .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 4px; }
  .dot-r { background: #ef4444; }
  .dot-y { background: #f59e0b; }
  .dot-g { background: #10b981; }
  pre {
    padding: 20px 24px;
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.9;
    color: #e2e8f0;
    overflow-x: auto;
    white-space: pre;
  }
  .kw { color: #7c3aed; font-weight: 700; }
  .fn { color: #00d4ff; }
  .str { color: #10b981; }
  .num { color: #f59e0b; }
  .cm { color: #475569; font-style: italic; }
  .tbl { color: #ff6b35; }

  /* QUIZ */
  .quiz-section {
    background: var(--surface);
    border: 1px solid rgba(255,107,53,0.2);
    border-radius: 16px;
    padding: 32px;
    margin: 40px 0;
  }
  .quiz-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 24px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }
  .quiz-icon { font-size: 24px; }
  .quiz-title { font-size: 20px; font-weight: 700; color: var(--accent2); }
  .quiz-question {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 16px;
    line-height: 1.6;
  }
  .quiz-options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
  .quiz-option {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 18px;
    cursor: pointer;
    font-size: 14px;
    line-height: 1.5;
    transition: all 0.2s;
    text-align: left;
    color: var(--text);
    font-family: var(--sans);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .quiz-option:hover { border-color: var(--accent); background: rgba(0,212,255,0.04); }
  .quiz-option.correct { border-color: var(--green); background: rgba(16,185,129,0.1); color: #6ee7b7; }
  .quiz-option.wrong { border-color: var(--red); background: rgba(239,68,68,0.08); color: #fca5a5; }
  .quiz-option.disabled { cursor: default; }
  .option-badge {
    width: 24px; height: 24px;
    background: var(--border);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--mono);
    font-size: 11px;
    flex-shrink: 0;
  }
  .quiz-feedback {
    padding: 14px 18px;
    border-radius: 10px;
    font-size: 14px;
    line-height: 1.6;
    display: none;
    margin-top: 8px;
  }
  .quiz-feedback.show { display: block; }
  .quiz-feedback.success { background: rgba(16,185,129,0.1); border: 1px solid var(--green); color: #6ee7b7; }
  .quiz-feedback.error { background: rgba(239,68,68,0.08); border: 1px solid var(--red); color: #fca5a5; }
  .quiz-nav { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
  .btn {
    padding: 10px 22px;
    border-radius: 8px;
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
    letter-spacing: 0.3px;
  }
  .btn-primary { background: var(--accent); color: var(--bg); }
  .btn-primary:hover { filter: brightness(1.15); }
  .btn-secondary { background: var(--surface2); border: 1px solid var(--border); color: var(--text); }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* PLAYGROUND */
  .playground {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    margin: 40px 0;
    overflow: hidden;
  }
  .playground-header {
    background: var(--surface2);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
    gap: 12px;
  }
  .playground-title {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 700;
    font-size: 15px;
  }
  .playground-title span { font-size: 20px; }
  .db-tabs { display: flex; gap: 6px; }
  .db-tab {
    padding: 6px 14px;
    border-radius: 6px;
    font-family: var(--mono);
    font-size: 11px;
    cursor: pointer;
    border: 1px solid var(--border);
    color: var(--muted);
    background: transparent;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }
  .db-tab.active { background: rgba(0,212,255,0.1); border-color: var(--accent); color: var(--accent); }
  .playground-body { display: flex; }
  .schema-panel {
    width: 220px;
    min-width: 220px;
    border-right: 1px solid var(--border);
    padding: 20px;
    background: #080d18;
  }
  .schema-panel h4 {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
  }
  .table-item {
    margin-bottom: 16px;
  }
  .table-name {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--accent2);
    font-weight: 700;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .table-name::before { content: '▶'; font-size: 9px; }
  .col-item {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    padding: 2px 0 2px 14px;
    display: flex;
    gap: 6px;
  }
  .col-pk { color: var(--yellow); font-weight: 700; }
  .col-type { color: #475569; }
  .editor-panel { flex: 1; display: flex; flex-direction: column; min-height: 400px; }
  .query-tabs { display: flex; border-bottom: 1px solid var(--border); background: #0a0f1c; }
  .query-tab {
    padding: 10px 20px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .query-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  textarea.sql-editor {
    flex: 1;
    background: #080d18;
    border: none;
    color: #e2e8f0;
    font-family: var(--mono);
    font-size: 13px;
    padding: 20px 24px;
    resize: none;
    outline: none;
    min-height: 160px;
    line-height: 1.9;
    width: 100%;
  }
  .editor-toolbar {
    background: var(--surface2);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-top: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .run-btn {
    background: linear-gradient(135deg, var(--green), #059669);
    color: white;
    border: none;
    padding: 8px 20px;
    border-radius: 8px;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    letter-spacing: 0.5px;
    transition: all 0.2s;
  }
  .run-btn:hover { filter: brightness(1.1); transform: translateY(-1px); }
  .hint-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--yellow);
    padding: 8px 16px;
    border-radius: 8px;
    font-family: var(--mono);
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .hint-btn:hover { border-color: var(--yellow); background: rgba(245,158,11,0.05); }
  .clear-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 8px 14px;
    border-radius: 8px;
    font-family: var(--mono);
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
    margin-left: auto;
  }
  .clear-btn:hover { border-color: var(--red); color: var(--red); }
  .results-panel {
    border-top: 1px solid var(--border);
    background: #060d1a;
    min-height: 120px;
    max-height: 280px;
    overflow: auto;
  }
  .results-header {
    padding: 10px 20px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .result-count {
    background: rgba(0,212,255,0.1);
    border: 1px solid rgba(0,212,255,0.2);
    color: var(--accent);
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 10px;
  }
  .results-table-wrap { overflow-x: auto; padding: 12px 0; }
  table.results-tbl {
    width: 100%;
    border-collapse: collapse;
    font-family: var(--mono);
    font-size: 12px;
  }
  .results-tbl th {
    background: var(--surface2);
    padding: 8px 16px;
    text-align: left;
    color: var(--accent);
    font-size: 11px;
    letter-spacing: 0.5px;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  .results-tbl td {
    padding: 8px 16px;
    border-bottom: 1px solid rgba(31,45,68,0.5);
    color: #94a3b8;
    white-space: nowrap;
  }
  .results-tbl tr:hover td { background: rgba(0,212,255,0.03); }
  .result-error {
    padding: 16px 20px;
    color: #fca5a5;
    font-family: var(--mono);
    font-size: 12px;
    background: rgba(239,68,68,0.06);
    border-left: 3px solid var(--red);
    margin: 12px;
    border-radius: 6px;
    line-height: 1.7;
  }
  .result-success {
    padding: 16px 20px;
    color: #6ee7b7;
    font-family: var(--mono);
    font-size: 12px;
    background: rgba(16,185,129,0.06);
    border-left: 3px solid var(--green);
    margin: 12px;
    border-radius: 6px;
  }
  .hint-panel {
    background: rgba(245,158,11,0.05);
    border: 1px solid rgba(245,158,11,0.2);
    border-radius: 10px;
    padding: 14px 18px;
    margin: 0 16px 12px;
    font-family: var(--mono);
    font-size: 12px;
    color: #fcd34d;
    display: none;
    line-height: 1.7;
  }
  .hint-panel.show { display: block; }

  /* CHAPTER NAV */
  .chapter-nav-btns {
    display: flex;
    justify-content: space-between;
    margin-top: 48px;
    padding-top: 28px;
    border-top: 1px solid var(--border);
    gap: 16px;
  }
  .nav-btn {
    display: flex;
    flex-direction: column;
    gap: 4px;
    padding: 16px 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.2s;
    min-width: 180px;
    text-align: left;
    color: var(--text);
    font-family: var(--sans);
  }
  .nav-btn:hover { border-color: var(--accent); background: rgba(0,212,255,0.04); }
  .nav-btn-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  .nav-btn-title { font-size: 15px; font-weight: 600; }
  .nav-btn.next { text-align: right; }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--surface); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

  /* DIVIDER */
  .section-divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border), transparent);
    margin: 40px 0;
  }

  /* JOIN DIAGRAM */
  .join-diagram {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0;
    margin: 24px 0;
    padding: 24px;
    background: var(--surface2);
    border-radius: 12px;
    border: 1px solid var(--border);
    flex-wrap: wrap;
    gap: 16px;
  }
  .venn-circle {
    width: 120px; height: 120px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 700;
    text-align: center;
    line-height: 1.4;
    flex-shrink: 0;
  }
  .venn-left { background: rgba(0,212,255,0.15); border: 2px solid var(--accent); color: var(--accent); margin-right: -30px; }
  .venn-right { background: rgba(255,107,53,0.15); border: 2px solid var(--accent2); color: var(--accent2); margin-left: -30px; }
  .venn-label { font-family: var(--mono); font-size: 11px; color: var(--muted); text-align: center; }

  /* RESPONSIVE */
  @media (max-width: 900px) {
    .sidebar { display: none; }
    .main-content { padding: 32px 24px; }
    .playground-body { flex-direction: column; }
    .schema-panel { width: 100%; }
  }

  .highlight-box {
    background: linear-gradient(135deg, rgba(0,212,255,0.06), rgba(124,58,237,0.06));
    border: 1px solid rgba(0,212,255,0.15);
    border-radius: 12px;
    padding: 20px 24px;
    margin-bottom: 24px;
  }
  .highlight-box h4 { color: var(--accent); font-size: 14px; margin-bottom: 10px; font-family: var(--mono); letter-spacing: 0.5px; }
  .highlight-box p, .highlight-box li { font-size: 14px; color: #94a3b8; line-height: 1.75; }
  .highlight-box ul { padding-left: 18px; }
</style>
</head>
<body>

<div class="hero">
  <!-- ConnecTech Constellation Logo -->

        <h3>Primary Key (PK) — The Unique Identifier</h3>
        <p>Every table should have a <strong>Primary Key</strong> — one column (or combination of columns)

        <ul>
          <li><strong>Unique</strong> — No two rows can have the same PK value</li>
          <li><strong>Not Null</strong> — A PK can never be empty/blank</li>
          <li><strong>Stable</strong> — It should never change once set</li>

      <div class="code-block">

      <div class="concept-card">
        <h3>Foreign Key (FK) — The Link Between Tables</h3>
        <p>A <strong>Foreign Key</strong> is a column in one table that <em>references</em> the Primary Key

        <p>In our example, the <code>orders</code> table has a <code>customer_id</code> column.

      locateFile: file => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/${file}`
    });
    db = new SQL.Database();
    db.run(DB_SCHEMA);
    console.log("Database initialised!");
  } catch(e) {
    console.error("DB init failed:", e);
  }
}

// ─── RENDER ───────────────────────────────────────────────────────────────────

function renderSidebar() {
  const nav = document.getElementById('chapterNav');
  nav.innerHTML = chapters.map(ch => `
    <div class="chapter-group">
      <button class="chapter-btn ${ch.id === currentChapter ? 'active' : ''} ${completedChapters.has(ch.id) ? 'completed' : ''}"
              onclick="goToChapter(${ch.id})">
        <span class="chapter-num">${completedChapters.has(ch.id) ? '' : ch.id + 1}</span>
        ${ch.tag}: ${ch.title}
      </button>
    </div>
  `).join('');
}

function renderProgress() {
  const pct = (completedChapters.size / chapters.length) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${completedChapters.size} / ${chapters.length} chapters`;
}

function goToChapter(id) {
  currentChapter = id;
  renderSidebar();
  renderChapter();
  document.querySelector('.main-content').scrollTop = 0;
  window.scrollTo(0, 0);
}

function renderChapter() {
  const ch = chapters[currentChapter];
  const quiz = renderQuiz(ch);
  const playground = renderPlayground(ch);

  const prevBtn = currentChapter > 0 ? `
    <button class="nav-btn" onclick="goToChapter(${currentChapter - 1})">
      <span class="nav-btn-label">← Previous</span>
      <span class="nav-btn-title">${chapters[currentChapter - 1].title}</span>
    </button>
  ` : '<div></div>';

  const nextBtn = currentChapter < chapters.length - 1 ? `
    <button class="nav-btn next" onclick="goToChapter(${currentChapter + 1})">
      <span class="nav-btn-label">Next →</span>
      <span class="nav-btn-title">${chapters[currentChapter + 1].title}</span>
    </button>
  ` : `<button class="nav-btn next" onclick="alert('🎉 You\\'ve completed all chapters! You are now an SQL hero!')">
    <span class="nav-btn-label">🎉 Complete!</span>
    <span class="nav-btn-title">You did it!</span>
  </button>`;

  document.getElementById('mainContent').innerHTML = `
    <div class="chapter-header">
      <div class="chapter-tag">${ch.tag}</div>
      <h2>${ch.title}</h2>
      <p class="lead">${ch.lead}</p>
    </div>
    ${ch.content}
    <div class="section-divider"></div>
    ${quiz}
    ${playground}
    <div class="chapter-nav-btns">
      ${prevBtn}
      ${nextBtn}
    </div>
  `;

  // Re-attach quiz handlers
  attachQuizHandlers(ch);
  attachPlaygroundHandlers(ch);
}

// ─── QUIZ ─────────────────────────────────────────────────────────────────────

function renderQuiz(ch) {
  const state = quizStates[ch.id] || { current: 0, score: 0, answers: {}, done: false };
  const qi = state.current;
  const q = ch.quiz.questions[qi];
  const total = ch.quiz.questions.length;

  if (state.done) {
    const pct = Math.round((state.score / total) * 100);
    const emoji = pct === 100 ? '🏆' : pct >= 66 ? '👍' : '📖';
    return `
      <div class="quiz-section">
        <div class="quiz-header">
          <span class="quiz-icon">✅</span>
          <span class="quiz-title">Quiz Complete!</span>
        </div>
        <div style="text-align:center;padding:20px">
          <div style="font-size:48px;margin-bottom:16px">${emoji}</div>
          <div style="font-size:28px;font-weight:800;color:var(--accent);margin-bottom:8px">${state.score}/${total} correct</div>
          <div style="color:var(--muted);margin-bottom:24px">${pct === 100 ? 'Perfect score! You nailed it.' : pct >= 66 ? 'Great work! Keep it up.' : 'Review the chapter content and try again!'}</div>
          <button class="btn btn-secondary" onclick="resetQuiz(${ch.id})">Retry Quiz</button>
          ${currentChapter < chapters.length - 1 ? `<button class="btn btn-primary" style="margin-left:10px" onclick="goToChapter(${currentChapter + 1})">Next Chapter →</button>` : ''}
        </div>
      </div>
    `;
  }

  return `
    <div class="quiz-section">
      <div class="quiz-header">
        <span class="quiz-icon">🧠</span>
        <span class="quiz-title">Quick Quiz — Question ${qi + 1} of ${total}</span>
      </div>
      <div class="quiz-question">${q.q}</div>
      <div class="quiz-options" id="quizOptions">
        ${q.options.map((opt, i) => `
          <button class="quiz-option" data-index="${i}" onclick="answerQuiz(${ch.id}, ${qi}, ${i})">
            <span class="option-badge">${String.fromCharCode(65 + i)}</span>
            ${opt}
          </button>
        `).join('')}
      </div>
      <div class="quiz-feedback" id="quizFeedback"></div>
      <div class="quiz-nav">
        <button class="btn btn-primary" id="nextQBtn" style="display:none" onclick="nextQuestion(${ch.id})">
          ${qi < total - 1 ? 'Next Question →' : 'See Results'}
        </button>
      </div>
    </div>
  `;
}

function answerQuiz(chId, qi, selected) {
  const ch = chapters[chId];
  const q = ch.quiz.questions[qi];
  if (!quizStates[chId]) quizStates[chId] = { current: 0, score: 0, answers: {}, done: false };
  const state = quizStates[chId];

  if (state.answers[qi] !== undefined) return;
  state.answers[qi] = selected;
  if (selected === q.correct) state.score++;

  const opts = document.querySelectorAll('.quiz-option');
  opts.forEach((btn, i) => {
    btn.classList.add('disabled');
    if (i === q.correct) btn.classList.add('correct');
    else if (i === selected) btn.classList.add('wrong');
  });

  const fb = document.getElementById('quizFeedback');
  fb.classList.add('show');
  if (selected === q.correct) {
    fb.classList.add('success');
    fb.innerHTML = '✅ ' + q.explanation;
  } else {
    fb.classList.add('error');
    fb.innerHTML = '❌ ' + q.explanation;
  }
  document.getElementById('nextQBtn').style.display = 'inline-flex';
}

function nextQuestion(chId) {
  const state = quizStates[chId];
  const total = chapters[chId].quiz.questions.length;
  state.current++;
  if (state.current >= total) {
    state.done = true;
    completedChapters.add(chId);
    renderProgress();
    renderSidebar();
  }
  renderChapter();
}

function resetQuiz(chId) {
  quizStates[chId] = { current: 0, score: 0, answers: {}, done: false };
  renderChapter();
}

function attachQuizHandlers() { /* handlers attached inline */ }

// ─── PLAYGROUND ───────────────────────────────────────────────────────────────

function renderPlayground(ch) {
  const schemaHTML = SCHEMA_DISPLAY.map(t => `
    <div class="table-item">
      <div class="table-name">${t.name}</div>
      ${t.cols.map(c => `
        <div class="col-item">
          <span class="${c.pk ? 'col-pk' : ''}">${c.name}</span>
          <span class="col-type">${c.type}${c.pk ? ' PK' : ''}</span>
        </div>
      `).join('')}
    </div>
  `).join('');

  const tabsHTML = SAMPLE_QUERIES.map((sq, i) => `
    <div class="query-tab ${i === 0 ? 'active' : ''}" onclick="loadSampleQuery(${i})">${sq.label}</div>
  `).join('');

  return `
    <div class="playground">
      <div class="playground-header">
        <div class="playground-title">
          <span>⚡</span>
          Live SQL Playground
        </div>
        <div style="font-family:var(--mono);font-size:11px;color:var(--green)">● Database Ready</div>
      </div>
      <div class="playground-body">
        <div class="schema-panel">
          <h4>📋 Schema</h4>
          ${schemaHTML}
        </div>
        <div class="editor-panel">
          <div class="query-tabs">${tabsHTML}</div>
          <textarea class="sql-editor" id="sqlEditor" spellcheck="false" placeholder="Write your SQL here...">${ch.playground.defaultQuery}</textarea>
          <div class="editor-toolbar">
            <button class="run-btn" onclick="runQuery()">▶ Run Query</button>
            <button class="hint-btn" onclick="toggleHint()">💡 Hint</button>
            <button class="clear-btn" onclick="clearEditor()">✕ Clear</button>
          </div>
          <div class="hint-panel" id="hintPanel">${ch.playground.hint}</div>
          <div class="results-panel" id="resultsPanel">
            <div class="results-header" style="background:transparent;border:none;padding:20px;color:var(--muted)">
              Run a query to see results here ↑
            </div>
          </div>
        </div>
      </div>
    </div>
  `;
}

function attachPlaygroundHandlers(ch) {
  // Keyboard shortcut: Ctrl/Cmd + Enter to run
  const editor = document.getElementById('sqlEditor');
  if (editor) {
    editor.addEventListener('keydown', e => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
        e.preventDefault();
        runQuery();
      }
    });
  }

  // Sample query tabs
  document.querySelectorAll('.query-tab').forEach((tab, i) => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.query-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      if (editor) editor.value = SAMPLE_QUERIES[i].q;
    });
  });
}

function loadSampleQuery(i) {
  const editor = document.getElementById('sqlEditor');
  if (editor) editor.value = SAMPLE_QUERIES[i].q;
}

function toggleHint() {
  const panel = document.getElementById('hintPanel');
  if (panel) panel.classList.toggle('show');
}

function clearEditor() {
  const editor = document.getElementById('sqlEditor');
  if (editor) editor.value = '';
  document.getElementById('resultsPanel').innerHTML = `
    <div class="results-header" style="background:transparent;border:none;padding:20px;color:var(--muted)">
      Editor cleared. Write a new query above ↑
    </div>`;
}

function runQuery() {
  if (!db) {
    document.getElementById('resultsPanel').innerHTML = `
      <div class="result-error">⚠ Database is still loading. Please wait a moment and try again.</div>`;
    return;
  }

  const sql = document.getElementById('sqlEditor').value.trim();
  if (!sql) {
    document.getElementById('resultsPanel').innerHTML = `
      <div class="result-error">Please write a SQL query first.</div>`;
    return;
  }

  const resultsPanel = document.getElementById('resultsPanel');

  try {
    // Handle multiple statements
    const statements = sql.split(';').map(s => s.trim()).filter(s => s.length > 0);
    let lastResult = null;
    let affectedCount = 0;

    for (const stmt of statements) {
      const upper = stmt.toUpperCase().trim();
      if (upper.startsWith('SELECT')) {
        const res = db.exec(stmt);
        lastResult = { type: 'select', data: res };
      } else {
        db.run(stmt);
        affectedCount++;
        lastResult = { type: 'write', stmt };
      }
    }

    if (!lastResult) return;

    if (lastResult.type === 'select') {
      const res = lastResult.data;
      if (!res || res.length === 0) {
        resultsPanel.innerHTML = `
          <div class="results-header">No rows returned.</div>`;
        return;
      }
      const { columns, values } = res[0];
      const rowCount = values.length;

      const headerCells = columns.map(c => `<th>${c}</th>`).join('');
      const dataRows = values.map(row =>
        `<tr>${row.map(cell => `<td>${cell === null ? '<em style="color:#475569">NULL</em>' : cell}</td>`).join('')}</tr>`
      ).join('');

      resultsPanel.innerHTML = `
        <div class="results-header">
          Results
          <span class="result-count">${rowCount} row${rowCount !== 1 ? 's' : ''}</span>
        </div>
        <div class="results-table-wrap">
          <table class="results-tbl">
            <thead><tr>${headerCells}</tr></thead>
            <tbody>${dataRows}</tbody>
          </table>
        </div>`;
    } else {
      // Non-SELECT: show success, then re-show if they followed with comment
      resultsPanel.innerHTML = `
        <div class="result-success">✅ Statement executed successfully. Run a SELECT query to see the updated data.</div>`;
    }

  } catch (err) {
    resultsPanel.innerHTML = `
      <div class="result-error">
        <strong>SQL Error:</strong><br>${err.message}<br><br>
        <span style="color:#475569">Tip: Check your spelling, quotes around text values, and make sure the table and column names are correct.</span>
      </div>`;
  }
}

// ─── BOOT ─────────────────────────────────────────────────────────────────────

(async () => {
  await initDB();
  renderSidebar();
  renderChapter();
  renderProgress();
})();
</script>
</body>
</html>
